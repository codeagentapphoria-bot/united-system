<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Borongan City Residents Portal — Access government services and programs online." />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Borongan Residents Portal" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <!-- iOS PWA splash screens -->
  <link rel="apple-touch-startup-image" href="/splash-640x920.png" media="(device-width: 320px) and (device-height: 480px) and (-webkit-device-pixel-ratio: 2)" />
  <link rel="apple-touch-startup-image" href="/splash-828x1472.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="/splash-1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" />
  <link rel="apple-touch-startup-image" href="/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
  <title>Borongan Residents Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- Critical: inline splash styles to prevent FOUC before CSS loads -->
  <style>
    #splash{position:fixed;inset:0;background-color:#1d4ed8;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 300ms ease-out}#splash.hide{opacity:0;pointer-events:none}#splash .splash-logo{width:120px;height:120px;object-fit:contain;border-radius:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25))}#splash .splash-name{font-family:'Poppins',sans-serif;font-size:1.5rem;font-weight:600;color:#ffffff;margin-top:16px;letter-spacing:0.02em}#splash .splash-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.25);border-top-color:#ffffff;border-radius:50%;margin-top:24px;animation:splash-spin 0.8s linear infinite}@keyframes splash-spin{to{transform:rotate(360deg)}}
  </style>
</head>

<body>
  <!-- Branded PWA splash — visible before React hydrates -->
  <div id="splash">
    <img class="splash-logo" src="/lgu-borongan-512.png" alt="Borongan City" />
    <p class="splash-name">Borongan Residents Portal</p>
    <div class="splash-spinner"></div>
  </div>
  <!-- Capture beforeinstallprompt as early as possible — before any module loads -->
  <script>
    window.__pwaInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__pwaInstallPrompt = e;
    });
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
