merge:
  client: 5174
  server: 3000
  port: 8081
  api_prefixes:
    - /api
    - /health
    - /socket.io
    - /notifications
    - /uploads

processes:
  frontend:
    cmd: npm run dev
    dir: ./multysis-frontend
    env:
      PORT: "5174"
  backend:
    cmd: npm run dev
    dir: ./multysis-backend
    env:
      PORT: "3000"
    restart: on-failure
    max_restarts: 10
    shutdown_timeout: 10
